<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 30" role="img" aria-label="Starkwall logo">
  <rect x="1" y="1" width="42" height="28" rx="7" fill="#8b1414" stroke="#ffffff" stroke-width="2"/>
  <rect x="2.5" y="2.5" width="39" height="25" rx="6" fill="none" stroke="#7a1212" stroke-width="1"/>

  <!-- Top row bricks -->
  <rect x="3" y="3" width="16" height="11" fill="#b71c1c"/>
  <rect x="21" y="3" width="20" height="11" fill="#b71c1c"/>

  <!-- Mortar line -->
  <rect x="3" y="14" width="38" height="2" fill="#ffffff"/>

  <!-- Bottom row bricks (offset pattern) -->
  <rect x="3" y="16" width="8" height="11" fill="#d32f2f"/>
  <rect x="13" y="16" width="18" height="11" fill="#d32f2f"/>
  <rect x="33" y="16" width="8" height="11" fill="#d32f2f"/>

  <!-- Vertical mortar -->
  <rect x="19" y="3" width="2" height="11" fill="#ffffff"/>
  <rect x="11" y="16" width="2" height="11" fill="#ffffff"/>
  <rect x="31" y="16" width="2" height="11" fill="#ffffff"/>
</svg>
